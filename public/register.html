<!DOCTYPE html>
<html>
<head>

<title>Create Account</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black flex items-center justify-center h-screen text-white">

<div class="bg-gray-900 p-10 rounded-xl w-96">

<h2 class="text-2xl mb-6 font-bold">Create Account</h2>

<input id="name" placeholder="Full name"
class="w-full p-2 mb-4 bg-gray-800 rounded">

<input id="username" placeholder="Username"
class="w-full p-2 mb-4 bg-gray-800 rounded">

<input id="password" type="password" placeholder="Password"
class="w-full p-2 mb-4 bg-gray-800 rounded">

<select id="role" class="w-full p-2 mb-4 bg-gray-800 rounded">
<option value="student">Student</option>
<option value="admin">Admin</option>
</select>

<button onclick="register()"
class="w-full bg-purple-600 p-2 rounded">
Create Account
</button>

</div>

<script>

async function register(){

const name=document.getElementById("name").value
const username=document.getElementById("username").value
const password=document.getElementById("password").value
const role=document.getElementById("role").value

await fetch("/auth/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
username,
password,
role
})

})

alert("Account Created")

window.location="login.html"

}

</script>

</body>
</html>
